<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GridSync Interface</title>
  <style>
    /* ?? Reset & Variables ??????????????????????????????????????????????? */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:          #f0f2f8;
      --surface:     #ffffff;
      --sidebar-bg:  #1a2035;
      --sidebar-w:   260px;
      --accent:      #4f46e5;
      --accent-h:    #4338ca;
      --accent-lt:   #eef2ff;
      --success:     #10b981;
      --danger:      #ef4444;
      --warning:     #f59e0b;
      --text:        #1e293b;
      --text-muted:  #64748b;
      --border:      #e2e8f0;
      --radius:      10px;
      --shadow:      0 4px 24px rgba(0,0,0,.08);
      --transition:  .18s ease;
    }
    html, body { height: 100%; font-family: 'Segoe UI', system-ui, sans-serif; color: var(--text); background: var(--bg); }

    /* ?? Login ??????????????????????????????????????????????????????????? */
    #login-screen {
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh;
      background: linear-gradient(135deg, #1a2035 0%, #2d3561 100%);
    }
    .login-card {
      background: var(--surface); border-radius: 18px; padding: 48px 40px;
      width: 380px; box-shadow: 0 20px 60px rgba(0,0,0,.3);
    }
    .login-logo { display: flex; align-items: center; gap: 12px; margin-bottom: 32px; }
    .login-logo .logo-icon {
      width: 44px; height: 44px; border-radius: 12px;
      background: var(--accent); display: flex; align-items: center; justify-content: center;
    }
    .login-logo .logo-icon svg { width: 24px; height: 24px; fill: #fff; }
    .login-logo h1 { font-size: 22px; font-weight: 700; color: var(--text); }
    .login-logo p { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
    .form-group { margin-bottom: 18px; }
    .form-group label { display: block; font-size: 13px; font-weight: 600; color: var(--text-muted); margin-bottom: 6px; }
    .form-group input, .form-group select, .form-group textarea {
      width: 100%; padding: 10px 14px; border: 1.5px solid var(--border);
      border-radius: 8px; font-size: 14px; color: var(--text);
      background: var(--surface); transition: border-color var(--transition);
    }
    .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
      outline: none; border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(79,70,229,.15);
    }
    .form-group textarea { resize: vertical; min-height: 72px; }
    .btn {
      display: inline-flex; align-items: center; gap: 7px;
      padding: 10px 20px; border: none; border-radius: 8px;
      font-size: 14px; font-weight: 600; cursor: pointer; transition: background var(--transition), transform .1s;
      text-decoration: none;
    }
    .btn:active { transform: scale(.97); }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover { background: var(--accent-h); }
    .btn-success { background: var(--success); color: #fff; }
    .btn-success:hover { background: #059669; }
    .btn-danger  { background: var(--danger); color: #fff; }
    .btn-danger:hover  { background: #dc2626; }
    .btn-ghost   { background: transparent; color: var(--text-muted); border: 1.5px solid var(--border); }
    .btn-ghost:hover   { background: var(--bg); color: var(--text); }
    .btn-sm { padding: 6px 12px; font-size: 12px; }
    .btn-full { width: 100%; justify-content: center; }
    .btn-icon { padding: 7px; }

    /* ?? App Shell ??????????????????????????????????????????????????????? */
    #app { display: none; height: 100vh; overflow: hidden; }
    #app.visible { display: flex; }

    /* ?? Sidebar ????????????????????????????????????????????????????????? */
    .sidebar {
      width: var(--sidebar-w); background: var(--sidebar-bg);
      display: flex; flex-direction: column; flex-shrink: 0;
      overflow-y: auto; color: #c8d0e7;
    }
    .sidebar-header {
      padding: 22px 20px 18px; display: flex; align-items: center; gap: 10px;
      border-bottom: 1px solid rgba(255,255,255,.07);
    }
    .sidebar-header .logo-icon {
      width: 36px; height: 36px; background: var(--accent);
      border-radius: 9px; display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }
    .sidebar-header .logo-icon svg { width: 20px; height: 20px; fill: #fff; }
    .sidebar-header .app-name { font-size: 15px; font-weight: 700; color: #fff; }
    .sidebar-header .app-sub  { font-size: 11px; color: #7c87a6; margin-top: 1px; }

    .project-badge {
      margin: 14px 16px 6px;
      background: rgba(79,70,229,.18); border: 1px solid rgba(79,70,229,.3);
      border-radius: 8px; padding: 10px 12px;
    }
    .project-badge .label { font-size: 10px; text-transform: uppercase; letter-spacing: .8px; color: #7c87a6; }
    .project-badge .name  { font-size: 13px; font-weight: 600; color: #c8d0e7; margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    .sidebar-section-title {
      padding: 16px 20px 6px; font-size: 10px; text-transform: uppercase;
      letter-spacing: 1px; color: #4a5568; font-weight: 700;
    }
    .nav-item {
      display: flex; align-items: center; gap: 10px;
      padding: 9px 20px; font-size: 13.5px; font-weight: 500;
      color: #8a95b3; cursor: pointer; border-radius: 0;
      transition: background var(--transition), color var(--transition);
      user-select: none;
    }
    .nav-item svg { width: 16px; height: 16px; flex-shrink: 0; opacity: .7; }
    .nav-item:hover  { background: rgba(255,255,255,.06); color: #c8d0e7; }
    .nav-item.active { background: rgba(79,70,229,.22); color: #fff; }
    .nav-item.active svg { opacity: 1; }

    .sidebar-footer {
      margin-top: auto; border-top: 1px solid rgba(255,255,255,.07);
      padding: 14px 16px;
    }
    .user-badge {
      display: flex; align-items: center; gap: 10px; cursor: pointer;
    }
    .user-avatar {
      width: 34px; height: 34px; border-radius: 50%; background: var(--accent);
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; font-weight: 700; color: #fff; flex-shrink: 0;
    }
    .user-info .u-name { font-size: 13px; font-weight: 600; color: #c8d0e7; }
    .user-info .u-role { font-size: 11px; color: #7c87a6; }

    /* ?? Main Content ???????????????????????????????????????????????????? */
    .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

    .topbar {
      height: 60px; background: var(--surface); border-bottom: 1px solid var(--border);
      display: flex; align-items: center; padding: 0 28px; gap: 12px; flex-shrink: 0;
      box-shadow: 0 1px 3px rgba(0,0,0,.05);
    }
    .topbar-title { font-size: 17px; font-weight: 700; flex: 1; }
    .topbar-actions { display: flex; gap: 8px; }

    .content { flex: 1; overflow-y: auto; padding: 28px; }

    /* ?? Cards ??????????????????????????????????????????????????????????? */
    .card {
      background: var(--surface); border-radius: var(--radius);
      box-shadow: var(--shadow); border: 1px solid var(--border);
    }
    .card-header {
      padding: 18px 22px 14px; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 10px;
    }
    .card-header h2 { font-size: 15px; font-weight: 700; flex: 1; }
    .card-body { padding: 20px 22px; }

    /* ?? Project Grid ???????????????????????????????????????????????????? */
    .projects-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 18px;
    }
    .project-card {
      background: var(--surface); border: 1.5px solid var(--border);
      border-radius: var(--radius); padding: 20px; cursor: pointer;
      transition: border-color var(--transition), box-shadow var(--transition);
    }
    .project-card:hover { border-color: var(--accent); box-shadow: 0 4px 20px rgba(79,70,229,.12); }
    .project-card .pc-name { font-size: 16px; font-weight: 700; margin-bottom: 6px; }
    .project-card .pc-desc { font-size: 13px; color: var(--text-muted); margin-bottom: 14px; min-height: 36px; }
    .project-card .pc-meta { font-size: 11px; color: var(--text-muted); display: flex; justify-content: space-between; margin-bottom: 14px; }
    .project-card .pc-actions { display: flex; gap: 8px; }

    /* ?? Data Table ?????????????????????????????????????????????????????? */
    .data-table { width: 100%; border-collapse: collapse; font-size: 13.5px; }
    .data-table th {
      text-align: left; padding: 10px 14px; font-size: 11px; font-weight: 700;
      text-transform: uppercase; letter-spacing: .5px; color: var(--text-muted);
      background: var(--bg); border-bottom: 2px solid var(--border);
    }
    .data-table td { padding: 11px 14px; border-bottom: 1px solid var(--border); vertical-align: middle; }
    .data-table tr:last-child td { border-bottom: none; }
    .data-table tr:hover td { background: #f8fafc; }
    .data-table .actions { display: flex; gap: 6px; }

    /* ?? Badge ??????????????????????????????????????????????????????????? */
    .badge {
      display: inline-flex; align-items: center; padding: 2px 9px;
      border-radius: 99px; font-size: 11px; font-weight: 600;
    }
    .badge-blue   { background: #dbeafe; color: #1d4ed8; }
    .badge-green  { background: #d1fae5; color: #065f46; }
    .badge-purple { background: #ede9fe; color: #5b21b6; }
    .badge-gray   { background: #f1f5f9; color: #475569; }

    /* ?? Section Tabs ???????????????????????????????????????????????????? */
    .section-tabs { display: flex; gap: 0; border-bottom: 2px solid var(--border); margin-bottom: 22px; }
    .tab-btn {
      padding: 10px 20px; font-size: 13.5px; font-weight: 600;
      color: var(--text-muted); cursor: pointer; border-bottom: 2px solid transparent;
      margin-bottom: -2px; transition: color var(--transition), border-color var(--transition);
      background: none; border-top: none; border-left: none; border-right: none;
    }
    .tab-btn.active  { color: var(--accent); border-bottom-color: var(--accent); }
    .tab-btn:hover   { color: var(--text); }

    /* ?? Modals ?????????????????????????????????????????????????????????? */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,.45);
      display: none; align-items: center; justify-content: center; z-index: 1000;
      backdrop-filter: blur(3px);
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: var(--surface); border-radius: 16px; padding: 32px;
      width: 480px; max-width: 95vw; max-height: 90vh; overflow-y: auto;
      box-shadow: 0 24px 80px rgba(0,0,0,.2); animation: slideUp .2s ease;
    }
    .modal-lg { width: 640px; }
    @keyframes slideUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
    .modal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; }
    .modal-header h3 { font-size: 18px; font-weight: 700; }
    .modal-close { background: none; border: none; font-size: 22px; color: var(--text-muted); cursor: pointer; line-height: 1; padding: 2px; }
    .modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 24px; }

    /* ?? Toast ??????????????????????????????????????????????????????????? */
    #toast-container { position: fixed; bottom: 24px; right: 24px; z-index: 9999; display: flex; flex-direction: column; gap: 10px; }
    .toast {
      min-width: 280px; padding: 14px 18px; border-radius: 10px;
      font-size: 13.5px; font-weight: 500; color: #fff;
      box-shadow: 0 4px 20px rgba(0,0,0,.2); animation: fadeIn .25s ease;
    }
    @keyframes fadeIn { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }
    .toast.success { background: var(--success); }
    .toast.error   { background: var(--danger); }
    .toast.info    { background: var(--accent); }

    /* ?? Empty State ????????????????????????????????????????????????????? */
    .empty-state {
      text-align: center; padding: 48px 24px; color: var(--text-muted);
    }
    .empty-state svg { width: 56px; height: 56px; opacity: .3; margin-bottom: 16px; }
    .empty-state p { font-size: 14px; margin-bottom: 16px; }

    /* ?? Breadcrumb ?????????????????????????????????????????????????????? */
    .breadcrumb { font-size: 12px; color: var(--text-muted); display: flex; align-items: center; gap: 6px; margin-bottom: 18px; }
    .breadcrumb span { cursor: pointer; }
    .breadcrumb span:hover { color: var(--accent); }
    .breadcrumb .sep { opacity: .4; }

    /* ?? Loader ?????????????????????????????????????????????????????????? */
    .loader { display: flex; align-items: center; justify-content: center; padding: 40px; }
    .spinner { width: 28px; height: 28px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin .6s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ?? Dashboard Stats ????????????????????????????????????????????????? */
    .stats-row { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 16px; margin-bottom: 24px; }
    .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 18px 20px; }
    .stat-card .s-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .5px; color: var(--text-muted); }
    .stat-card .s-value { font-size: 28px; font-weight: 800; color: var(--text); margin-top: 4px; }
    .stat-card .s-sub   { font-size: 12px; color: var(--text-muted); margin-top: 2px; }

    /* ?? Tree ???????????????????????????????????????????????????????????? */
    .tree-node { padding: 8px 12px 8px 14px; display: flex; align-items: center; gap: 8px; border-radius: 7px; cursor: pointer; font-size: 13.5px; transition: background var(--transition); }
    .tree-node:hover { background: var(--accent-lt); }
    .tree-node.selected { background: var(--accent-lt); font-weight: 600; color: var(--accent); }
    .tree-node .ti { width: 14px; height: 14px; opacity: .6; }
    .tree-children { margin-left: 22px; border-left: 1.5px solid var(--border); padding-left: 8px; }

    /* ?? Detail Panel ???????????????????????????????????????????????????? */
    .detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px 20px; }
    .detail-item .di-label { font-size: 11px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 3px; }
    .detail-item .di-value { font-size: 14px; color: var(--text); font-weight: 500; }

    /* ?? Tag ????????????????????????????????????????????????????????????? */
    .tag { display: inline-block; background: var(--accent-lt); color: var(--accent); font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 5px; margin: 2px; }

    /* ?? Responsive ?????????????????????????????????????????????????????? */
    @media (max-width: 768px) {
      :root { --sidebar-w: 0px; }
      .sidebar { display: none; }
    }

    /* ?? User Management ??????????????????????????????????????????????????? */
    .badge-red    { background: #fee2e2; color: #991b1b; }
    .badge-orange { background: #ffedd5; color: #9a3412; }

    .user-mgmt-avatar {
      width: 36px; height: 36px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; font-weight: 700; color: #fff; flex-shrink: 0;
    }

    .toggle-btn {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 5px 10px; border-radius: 6px; font-size: 11px;
      font-weight: 700; cursor: pointer; border: none; transition: background var(--transition);
    }
    .toggle-btn.active  { background: #d1fae5; color: #065f46; }
    .toggle-btn.inactive{ background: #fee2e2; color: #991b1b; }
    .toggle-btn:hover   { opacity: .8; }

    .role-select {
      padding: 3px 8px; border: 1.5px solid var(--border); border-radius: 6px;
      font-size: 12px; font-weight: 600; background: var(--surface); cursor: pointer;
    }

    .user-row-self { background: #f5f3ff !important; }
    .user-row-self td { border-left: 3px solid var(--accent); }
  </style>
</head>
<body>

<!-- ?? Login Screen ???????????????????????????????????????????????????????? -->
<div id="login-screen">
  <div class="login-card">
    <div class="login-logo">
      <div class="logo-icon">
        <svg viewBox="0 0 24 24"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>
      </div>
      <div>
        <h1>GridSync</h1>
        <p>IEC 61850 Configuration Interface</p>
      </div>
    </div>
    <form id="login-form">
      <div class="form-group">
        <label>Username</label>
        <input type="text" id="login-username" required autocomplete="username" placeholder="Enter your username" />
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="login-password" required autocomplete="current-password" placeholder="Enter your password" />
      </div>
      <div id="login-error" style="color:var(--danger);font-size:13px;margin-bottom:12px;display:none;"></div>
      <button type="submit" class="btn btn-primary btn-full" id="login-btn">Sign In</button>
    </form>
  </div>
</div>

<!-- ?? App Shell ??????????????????????????????????????????????????????????? -->
<div id="app">
  <!-- Sidebar -->
  <nav class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="logo-icon"><svg viewBox="0 0 24 24"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg></div>
      <div><div class="app-name">GridSync</div><div class="app-sub">IEC 61850 Editor</div></div>
    </div>

    <div id="project-badge-wrap" style="display:none">
      <div class="project-badge">
        <div class="label">Active Project</div>
        <div class="name" id="active-project-name">�</div>
      </div>
    </div>

    <div class="sidebar-section-title">Workspace</div>
    <div class="nav-item active" data-view="dashboard" onclick="navigate('dashboard')">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M3 13h8V3H3v10zm0 8h8v-6H3v6zm10 0h8V11h-8v10zm0-18v6h8V3h-8z"/></svg>
      Dashboard
    </div>

    <div id="project-nav" style="display:none">
      <div class="sidebar-section-title">Project</div>
      <div class="nav-item" data-view="ieds" onclick="navigate('ieds')">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M4 6h16v2H4zm0 5h16v2H4zm0 5h16v2H4z"/></svg>
        IEDs
      </div>
      <div class="nav-item" data-view="substation" onclick="navigate('substation')">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
        Substation
      </div>
      <div class="nav-item" data-view="communication" onclick="navigate('communication')">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M1 9l2 2c4.97-4.97 13.03-4.97 18 0l2-2C16.93 2.93 7.08 2.93 1 9zm8 8l3 3 3-3c-1.65-1.66-4.34-1.66-6 0zm-4-4l2 2c2.76-2.76 7.24-2.76 10 0l2-2C15.14 9.14 8.87 9.14 5 13z"/></svg>
        Communication
      </div>
      <div class="nav-item" data-view="datasets" onclick="navigate('datasets')">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M20 3H4v10c0 2.21 1.79 4 4 4h6c2.21 0 4-1.79 4-4v-3h2c1.11 0 2-.89 2-2V5c0-1.11-.89-2-2-2zm0 5h-2V5h2v3zM4 19h16v2H4z"/></svg>
        Data Sets
      </div>
      <div class="nav-item" data-view="datatypes" onclick="navigate('datatypes')">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M9 21c0 .55.45 1 1 1h4c.55 0 1-.45 1-1v-1H9v1zm3-19C8.14 2 5 5.14 5 9c0 2.38 1.19 4.47 3 5.74V17c0 .55.45 1 1 1h6c.55 0 1-.45 1-1v-2.26c1.81-1.27 3-3.36 3-5.74 0-3.86-3.14-7-7-7z"/></svg>
        Data Type Templates
      </div>
      <div class="nav-item" data-view="audit" onclick="navigate('audit')">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M13 2.05V4.05C17.39 4.59 20.5 8.58 19.96 12.97C19.5 16.61 16.64 19.5 13 19.93V21.93C18.5 21.38 22.5 16.5 21.95 11C21.5 6.25 17.73 2.5 13 2.05M11 2.06C9.05 2.25 7.19 3 5.67 4.26L7.1 5.74C8.22 4.84 9.57 4.26 11 4.06V2.06M4.26 5.67C3 7.19 2.25 9.05 2.05 11H4.05C4.24 9.58 4.8 8.23 5.69 7.1L4.26 5.67M2.06 13C2.26 14.96 3.03 16.81 4.27 18.33L5.69 16.9C4.81 15.77 4.24 14.42 4.06 13H2.06M7.1 18.37L5.67 19.74C7.18 21 9.04 21.79 11 22V20C9.58 19.82 8.23 19.25 7.1 18.37M12 7L7 12H10V16H14V12H17L12 7Z"/></svg>
        Audit Log
      </div>
    </div>

    <!-- Admin-only section — shown/hidden by showApp() -->
    <div id="admin-nav" style="display:none">
      <div class="sidebar-section-title">Administration</div>
      <div class="nav-item" data-view="users" onclick="navigate('users')">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z"/></svg>
        User Management
      </div>
    </div>

const S = {
  token: localStorage.getItem('gs_token') || null,
  refreshToken: localStorage.getItem('gs_refresh') || null,
  user: null,
  project: null,   // current ProjectDto
  currentView: 'dashboard',
};

/* ???????????????????????????????????????????????????????????????????????????
   API
??????????????????????????????????????????????????????????????????????????? */
const API = '/api';

async function apiFetch(path, opts = {}) {
  const headers = { 'Content-Type': 'application/json', ...(opts.headers || {}) };
  if (S.token) headers['Authorization'] = `Bearer ${S.token}`;
  const res = await fetch(`${API}${path}`, { ...opts, headers });
  if (res.status === 401) { logout(); throw new Error('Unauthorized'); }
  if (!res.ok) {
    let msg = `Error ${res.status}`;
    try { const j = await res.json(); msg = j.title || j.message || j.detail || JSON.stringify(j); } catch {}
    throw new Error(msg);
  }
  if (res.status === 204) return null;
  return res.json();
}

const get  = (path)        => apiFetch(path);
const post = (path, body)  => apiFetch(path, { method: 'POST', body: JSON.stringify(body) });
const put  = (path, body)  => apiFetch(path, { method: 'PUT',  body: JSON.stringify(body) });
const del  = (path)        => apiFetch(path, { method: 'DELETE' });

/* ???????????????????????????????????????????????????????????????????????????
   TOAST
??????????????????????????????????????????????????????????????????????????? */
function toast(msg, type = 'info') {
  const t = document.createElement('div');
  t.className = `toast ${type}`;
  t.textContent = msg;
  document.getElementById('toast-container').appendChild(t);
  setTimeout(() => t.remove(), 3500);
}

/* ???????????????????????????????????????????????????????????????????????????
   MODAL
??????????????????????????????????????????????????????????????????????????? */
function openModal(title, bodyHTML, actions, large = false) {
  document.getElementById('modal-title').textContent = title;
  document.getElementById('modal-body').innerHTML = bodyHTML;
  const ac = document.getElementById('modal-actions');
  ac.innerHTML = '';
  (actions || []).forEach(a => {
    const b = document.createElement('button');
    b.className = `btn ${a.cls || 'btn-primary'}`;
    b.textContent = a.label;
    b.onclick = a.fn;
    ac.appendChild(b);
  });
  const box = document.getElementById('modal-box');
  box.className = large ? 'modal modal-lg' : 'modal';
  document.getElementById('modal-overlay').classList.add('open');
}

function closeModal(ev) {
  if (ev && ev.target !== document.getElementById('modal-overlay')) return;
  document.getElementById('modal-overlay').classList.remove('open');
}

/* ???????????????????????????????????????????????????????????????????????????
   AUTH
??????????????????????????????????????????????????????????????????????????? */
document.getElementById('login-form').addEventListener('submit', async e => {
  e.preventDefault();
  const btn = document.getElementById('login-btn');
  const errEl = document.getElementById('login-error');
  errEl.style.display = 'none';
  btn.textContent = 'Signing in...'; btn.disabled = true;
  try {
    const res = await post('/auth/login', {
      username: document.getElementById('login-username').value,
      password: document.getElementById('login-password').value,
    });
    S.token = res.accessToken;
    S.refreshToken = res.refreshToken;
    S.user = res.user;
    localStorage.setItem('gs_token', S.token);
    localStorage.setItem('gs_refresh', S.refreshToken);
    showApp();
  } catch (err) {
    errEl.textContent = err.message; errEl.style.display = 'block';
  } finally {
    btn.textContent = 'Sign In'; btn.disabled = false;
  }
});

function logout() {
  S.token = S.refreshToken = S.user = S.project = null;
  localStorage.removeItem('gs_token'); localStorage.removeItem('gs_refresh');
  document.getElementById('app').classList.remove('visible');
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('login-password').value = '';
}

  // Reserved for a future profile pop-up; logout button is always visible in sidebar.
}

async function showApp() {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').classList.add('visible');
  if (!S.user) {
    try { S.user = await get('/auth/me'); } catch {}
  }
  try {
    if (S.user) {
      const name     = S.user.fullName || S.user.username || '';
      const initials = name.split(' ').map(w => w[0]).join('').slice(0, 2).toUpperCase() || '?';
      const avatarEl = document.getElementById('user-avatar');
      const nameEl   = document.getElementById('user-name');
      const roleEl   = document.getElementById('user-role');
      const adminNav = document.getElementById('admin-nav');
      if (avatarEl) { avatarEl.textContent = initials; avatarEl.style.background = roleColor(S.user.role); }
      if (nameEl)   nameEl.textContent = name;
      if (roleEl)   roleEl.textContent = S.user.role;
      if (adminNav) adminNav.style.display = S.user.role === 'Admin' ? 'block' : 'none';
    }

    console.warn('showApp UI init error:', uiErr);

}

/* ???????????????????????????????????????????????????????????????????????????

function navigate(view, ...args) {
  S.currentView = view;
  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
  const active = document.querySelector(`.nav-item[data-view="${view}"]`);
  if (active) active.classList.add('active');
  const views = { dashboard, ieds, substation, communication, datasets, datatypes, audit, users };
  if (views[view]) views[view](...args);
}

// Role colours for avatars
const ROLE_COLORS = { Admin: '#7c3aed', Editor: '#0891b2', Viewer: '#059669' };

function roleColor(role) { return ROLE_COLORS[role] || '#64748b'; }

function userInitials(u) {
  return (u.fullName || u.username).split(' ').map(w => w[0]).join('').slice(0, 2).toUpperCase();
}

async function users() {
  if (S.user?.role !== 'Admin') { navigate('dashboard'); return; }
  setTopbar('User Management', `<button class="btn btn-primary btn-sm" onclick="showCreateUser()">

  setContent(loader());
  try {
    const list = await get('/auth/users');
    // Stats row
    const total    = list.length;
    const active   = list.filter(u => u.isActive).length;
    const admins   = list.filter(u => u.role === 'Admin').length;
    const editors  = list.filter(u => u.role === 'Editor').length;

    let rows = '';
    list.forEach(u => {
      const isSelf   = u.id === S.user.id;
      const initials = userInitials(u);
      const color    = roleColor(u.role);
      const roleBadge = u.role === 'Admin'

      rows += `<tr class="${isSelf ? 'user-row-self' : ''}">
        <td>
          <div style="display:flex;align-items:center;gap:10px">
            <div class="user-mgmt-avatar" style="background:${color}">${esc(initials)}</div>
            <div>
              <div style="font-weight:700">${esc(u.username)}${isSelf ? ' <span class="tag">You</span>' : ''}</div>
              <div style="font-size:11px;color:var(--text-muted)">${esc(u.fullName || '—')}</div>
            </div>
          </div>
        </td>
        <td>${esc(u.email || '—')}</td>
        <td>${roleBadge}</td>
        <td>${statusBadge}</td>
        <td>${lastLogin}</td>
        <td>${fmtDate(u.createdAt)}</td>
        <td>
          <div class="actions">
            <button class="btn btn-ghost btn-sm" onclick="showEditUser(${JSON.stringify(JSON.stringify(u))})">Edit</button>
            <button class="btn btn-ghost btn-sm" onclick="showResetPassword(${u.id},'${esc(u.username)}')">Reset Pwd</button>
            ${!isSelf ? `<button class="toggle-btn ${u.isActive ? 'active' : 'inactive'}"
              onclick="toggleUserActive(${u.id},${!u.isActive},'${esc(u.username)}')">
              ${u.isActive ? '⏸ Deactivate' : '▶ Activate'}
            </button>` : ''}
          </div>
        </td>
      </tr>`;
    });

    setContent(`
      <div class="stats-row" style="grid-template-columns:repeat(4,1fr)">
        <div class="stat-card">
          <div class="s-label">Total Users</div>
          <div class="s-value">${total}</div>
        </div>
        <div class="stat-card">
          <div class="s-label">Active</div>
          <div class="s-value" style="color:var(--success)">${active}</div>
        </div>
        <div class="stat-card">
          <div class="s-label">Admins</div>
          <div class="s-value" style="color:#7c3aed">${admins}</div>
        </div>
        <div class="stat-card">
          <div class="s-label">Editors</div>
          <div class="s-value" style="color:#0891b2">${editors}</div>
        </div>
      </div>

      <div class="card">
        <div class="card-header">
          <h2>System Users</h2>
          <button class="btn btn-primary btn-sm" onclick="showCreateUser()">+ Add User</button>
        </div>
        <div class="card-body" style="padding:0">
          ${list.length
            ? `<table class="data-table">
                <thead>
                  <tr>
                    <th>User</th><th>Email</th><th>Role</th>
                    <th>Status</th><th>Last Login</th><th>Created</th><th>Actions</th>
                  </tr>
                </thead>
                <tbody>${rows}</tbody>
               </table>`
            : emptyState('No users found.')}
        </div>
      </div>`);
  } catch (e) { toast(e.message, 'error'); }
}

/* ── Create User ──────────────────────────────────────────────────────── */
function showCreateUser() {
  openModal('Add New User', `
    <div class="form-group">
      <label>Username *</label>
      <input id="m-uname" type="text" maxlength="100" placeholder="e.g. john.doe" autocomplete="off" />
    </div>
    <div class="form-group">
      <label>Password *</label>
      <input id="m-upwd" type="password" minlength="8" placeholder="Min. 8 characters" autocomplete="new-password" />
    </div>
    <div class="form-group">
      <label>Full Name</label>
      <input id="m-ufname" type="text" maxlength="200" placeholder="e.g. John Doe" />
    </div>
    <div class="form-group">
      <label>Email</label>
      <input id="m-uemail" type="email" maxlength="200" placeholder="e.g. john@example.com" />
    </div>
    <div class="form-group">
      <label>Role *</label>
      <select id="m-urole">
        <option value="Viewer">Viewer — Read-only access</option>
        <option value="Editor">Editor — Can create and edit</option>
        <option value="Admin">Admin — Full access</option>
      </select>
    </div>`,
    [{ label: 'Cancel', cls: 'btn-ghost', fn: () => closeModal() },
     { label: 'Create User', fn: async () => {
       const pwd = document.getElementById('m-upwd').value;
       if (pwd.length < 8) { toast('Password must be at least 8 characters', 'error'); return; }
       try {
         await post('/auth/register', {
           username: document.getElementById('m-uname').value.trim(),
           password: pwd,
           fullName: document.getElementById('m-ufname').value.trim() || undefined,
           email:    document.getElementById('m-uemail').value.trim() || undefined,
           role:     document.getElementById('m-urole').value,
         });
         toast('User created successfully', 'success');
         closeModal();
         users();
       } catch (e) { toast(e.message, 'error'); }
     }}]);
}

/* ── Edit User ────────────────────────────────────────────────────────── */
function showEditUser(uJson) {
  const u = typeof uJson === 'string' ? JSON.parse(uJson) : uJson;
  const isSelf = u.id === S.user.id;
  openModal(`Edit User — ${u.username}`, `
    <div style="display:flex;align-items:center;gap:12px;padding:12px 16px;background:var(--bg);border-radius:10px;margin-bottom:20px">
      <div class="user-mgmt-avatar" style="background:${roleColor(u.role)}">${esc(userInitials(u))}</div>
      <div>
        <div style="font-weight:700;font-size:15px">${esc(u.username)}</div>
        <div style="font-size:12px;color:var(--text-muted)">ID #${u.id} · Joined ${fmtDate(u.createdAt)}</div>
      </div>
    </div>
    <div class="form-group">
      <label>Full Name</label>
      <input id="m-ufname" type="text" maxlength="200" value="${esc(u.fullName || '')}" />
    </div>
    <div class="form-group">
      <label>Email</label>
      <input id="m-uemail" type="email" maxlength="200" value="${esc(u.email || '')}" />
    </div>
    <div class="form-group">
      <label>Role</label>
      <select id="m-urole" ${isSelf ? 'disabled title="You cannot change your own role"' : ''}>
        <option value="Viewer"  ${u.role==='Viewer' ?'selected':''}>Viewer — Read-only access</option>
        <option value="Editor"  ${u.role==='Editor' ?'selected':''}>Editor — Can create and edit</option>
        <option value="Admin"   ${u.role==='Admin'  ?'selected':''}>Admin — Full access</option>
      </select>
      ${isSelf ? '<div style="font-size:11px;color:var(--text-muted);margin-top:4px">You cannot change your own role.</div>' : ''}
    </div>`,
    [{ label: 'Cancel', cls: 'btn-ghost', fn: () => closeModal() },
     { label: 'Save Changes', fn: async () => {
       try {
         await put(`/auth/users/${u.id}`, {
           role:     isSelf ? u.role : document.getElementById('m-urole').value,
           fullName: document.getElementById('m-ufname').value.trim() || undefined,
           email:    document.getElementById('m-uemail').value.trim() || undefined,
         });
         toast('User updated', 'success');
         closeModal();
         users();
       } catch (e) { toast(e.message, 'error'); }
     }}]);
}

/* ── Reset Password ───────────────────────────────────────────────────── */
function showResetPassword(userId, username) {
  openModal(`Reset Password — ${username}`, `
    <div style="background:#fff7ed;border:1px solid #fed7aa;border-radius:8px;padding:12px 14px;margin-bottom:18px;font-size:13px;color:#9a3412">
      ⚠️ This will immediately invalidate the user's current session and any active tokens.
    </div>
    <div class="form-group">
      <label>New Password *</label>
      <input id="m-newpwd" type="password" minlength="8" placeholder="Min. 8 characters" autocomplete="new-password" />
    </div>
    <div class="form-group">
      <label>Confirm Password *</label>
      <input id="m-confirmpwd" type="password" minlength="8" placeholder="Re-enter new password" autocomplete="new-password" />
    </div>`,
    [{ label: 'Cancel', cls: 'btn-ghost', fn: () => closeModal() },
     { label: 'Reset Password', cls: 'btn-danger', fn: async () => {
       const pwd     = document.getElementById('m-newpwd').value;
       const confirm = document.getElementById('m-confirmpwd').value;
       if (pwd.length < 8)    { toast('Password must be at least 8 characters', 'error'); return; }
       if (pwd !== confirm)   { toast('Passwords do not match', 'error'); return; }
       try {
         await put(`/auth/users/${userId}/reset-password`, { newPassword: pwd });
         toast(`Password reset for ${username}`, 'success');
         closeModal();
       } catch (e) { toast(e.message, 'error'); }
     }}]);
}

/* ── Toggle Active / Inactive ─────────────────────────────────────────── */
async function toggleUserActive(userId, newActiveState, username) {
  const action = newActiveState ? 'activate' : 'deactivate';
  if (!confirm(`${action.charAt(0).toUpperCase() + action.slice(1)} user "${username}"?`)) return;
  try {
    await apiFetch(`/auth/users/${userId}/active?active=${newActiveState}`, { method: 'PUT' });
    toast(`User ${username} ${newActiveState ? 'activated' : 'deactivated'}`,
          newActiveState ? 'success' : 'info');
    users();
  } catch (e) { toast(e.message, 'error'); }
}

/* ═══════════════════════════════════════════════════════════════════════════
   INIT
═══════════════════════════════════════════════════════════════════════════ */
(async () => {
  if (S.token) {
    try {
      S.user = await get('/auth/me');
      showApp();
    } catch { logout(); }
  }
})();
</script>
